spring:
  application:
    name: biblioteca-api
  datasource:
    url: jdbc:h2:file:./data/bibliotecadb
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true